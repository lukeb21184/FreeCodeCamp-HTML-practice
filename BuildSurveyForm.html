<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>
  
  <body>
  <h1 id="title">My Page Title</h1>
  <p id="description">Title Description</p>

  <form id="survey-form">
  <label id="name-label" for="name">Name:</label>
  <input id="name" type="text" required placeholder="Enter your name">

  <label id="email-label" for="email">Email:</label>
  <input id="email" type="email" required placeholder="Enter your email">

  <label id="number-label" for="number">Age:</label>
  <input id="number" type="number" min="1" max="100" placeholder="Enter your age">
  <select id="dropdown">
    <option value="student">Student</option>
    <option value="developer">Developer</option>
  </select>

  <p>Would you recommend this course?</p>
  <label>
    <input type="radio" name="recommend" value="yes">
    Yes
  </label>

  <label>
    <input type="radio" name="recommend" value="no">
    No
  </label>

  <p>What are some of your Hobbies</p>
  <label>
    <input type="checkbox" value="sports">Sports</input>
    <input type="checkbox" value="gaming">Gaming</input>
    <input type="checkbox" value="coding">Coding</input>

    <h4>Additional Comments?</h4>
  <textarea 
    id="comments" 
    name="comments" 
    rows="4" 
    cols="50" 
    placeholder="Enter your comments here...">
  </textarea>
    
    <button id="submit" type="submit">Submit</button>

  </form>

  </body>
</html>
